services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codekai-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # You can pass your GROQ_API_KEY from your local environment here
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codekai-frontend
    ports:
      - "5173:5173"
    environment:
      # If your frontend needs to know where the backend is, pass it here
      - VITE_API_URL=http://localhost:5000
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
